<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Todo App</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/semantic-ui@2.4.2/dist/semantic.min.css">
</head>
<body>
<div style="margin-top: 100px;" class="ui container">
    <div class="ui grid centered">
        <div class="eight wide column">

            <h2 class="ui center aligned header">
                <i class="tasks icon"></i> Todo App
            </h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="ui {{ 'red' if category == 'error' else 'green' }} message">
                    {{ message }}
                </div>
                {% endfor %}
            {% endif %}
            {% endwith %}

            <div class="ui segment">
                <h3 class="ui header">登录</h3>
                <form class="ui form" action="/login" method="post">
                    <div class="field">
                        <label>用户名</label>
                        <input type="text" name="username" placeholder="输入用户名" required autofocus>
                    </div>
                    <div class="field">
                        <label>密码</label>
                        <input type="password" name="password" placeholder="输入密码" required>
                    </div>
                    <button class="ui blue fluid button" type="submit">登录</button>
                </form>
            </div>

            <div class="ui message" style="text-align:center;">
                还没有账号？<a href="/register">立即注册</a>
            </div>

        </div>
    </div>
</div>
</body>
</html>
